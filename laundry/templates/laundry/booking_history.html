<h1>My Booking History</h1>

<ul>
    {% for booking in bookings %}
        <li>
            {{ booking.date }} - {{ booking.machine }} - {{ booking.timeslot }} - {{ booking.status }}
        </li>
    {% empty %}
        <li>No bookings yet.</li>
    {% endfor %}
</ul>

<a href="{% url 'create_booking' %}">Create a booking</a>
